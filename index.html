<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>セルフ診断</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; padding: 20px; background:#f7f7f7;}
.container { max-width:600px; margin:auto; background:#fff; padding:20px; border-radius:10px;}
h2 { margin-top:0;}
button {
  display:block; width:100%; margin:10px 0; padding:12px;
  border:none; border-radius:8px; background:#333; color:#fff; font-size:16px;
}
button:hover { background:#555;}
.result { background:#f0f0f0; padding:15px; border-radius:8px; margin-top:20px;}
</style>
</head>

<body>
<div class="container">

<h2 id="title">あなたに最適なコース診断</h2>

<div id="content"></div>

</div>

<script>

let gender = "";
let concerns = [];
let purpose = "";

// 初期画面
function start(){
  document.getElementById("content").innerHTML = `
    <p>性別を選択してください</p>
    <button onclick="setGender('male')">男性</button>
    <button onclick="setGender('female')">女性</button>
  `;
}

function setGender(g){
  gender = g;
  showConcerns();
}

// 悩み選択
function showConcerns(){

  let list = gender === "male" ? [
    "コリ・ハリ","冷え・むくみ","ストレス","不眠","頭痛・眼精疲労","だるさ","肌荒れ","精力・活力"
  ] : [
    "コリ・ハリ","冷え・むくみ","ストレス","不眠","頭痛・眼精疲労","だるさ","肌荒れ","美容"
  ];

  let html = "<p>気になる悩みを選択（複数OK）</p>";

  list.forEach(item=>{
    html += `<button onclick="toggleConcern('${item}')">${item}</button>`;
  });

  html += `<button onclick="showPurpose()">次へ</button>`;

  document.getElementById("content").innerHTML = html;
}

function toggleConcern(c){
  if(concerns.includes(c)){
    concerns = concerns.filter(x=>x!==c);
  } else {
    concerns.push(c);
  }
}

// 目的
function showPurpose(){
  let list = gender === "male" ? [
    "疲れを取りたい","リラックスしたい","体を整えたい","美容も気になる","活力を上げたい"
  ] : [
    "疲れを取りたい","リラックスしたい","体を整えたい","キレイになりたい"
  ];

  let html = "<p>目的を選択してください</p>";

  list.forEach(item=>{
    html += `<button onclick="setPurpose('${item}')">${item}</button>`;
  });

  document.getElementById("content").innerHTML = html;
}

function setPurpose(p){
  purpose = p;
  showResult();
}

// 診断ロジック
function showResult(){

  let course = "";
  let reason = "";
  let options = [];

  // 男性ロジック
  if(gender === "male"){

    if(concerns.includes("精力・活力")){
      course = "メンズブースト";
      reason = "活力・精力アップに特化した下半身集中ケア";
      options.push("メンズエナジー");
    }

    if(concerns.includes("コリ・ハリ") && concerns.includes("ストレス") && concerns.includes("不眠")){
      course = "メンズリカバリー";
      reason = "深部のコリ＋ストレス＋不眠に対応する最上位ケア";
    }

    if(course === "" && (concerns.includes("コリ・ハリ") || concerns.includes("冷え・むくみ"))){
      course = "メンズアロマ";
      reason = "整体＋オイルで血流とコリを改善";
    }

    if(concerns.length >=5){
      course = "メンズマックス";
      reason = "全身フルケアの最上位コース";
    }

    if(course === ""){
      course = "リラックスセット";
      reason = "全身をバランスよく整えるベーシックケア";
    }

    // オプション
    if(concerns.includes("ストレス") || concerns.includes("不眠")){
      options.push("炭酸ヘッドセラピー");
    }

    if(concerns.includes("頭痛・眼精疲労")){
      options.push("スペシャルヘッドセラピー");
    }

    if(concerns.includes("肌荒れ")){
      options.push("背中スクラブ");
    }

    if(concerns.includes("冷え・むくみ")){
      options.push("SIXPAD");
    }

  }

  // 女性ロジック
  if(gender === "female"){

    if(concerns.includes("美容")){
      course = "シンデレラフェイシャル";
      reason = "美容成分導入とリフトアップケア";
    }

    if(concerns.includes("コリ・ハリ") && concerns.includes("ストレス")){
      course = "シンデレラリラックス";
      reason = "疲労とストレスを同時に解消する人気コース";
    }

    if(course === "" && concerns.includes("冷え・むくみ")){
      course = "リフレクソロジー";
      reason = "むくみ・冷え改善の足元集中ケア";
    }

    if(concerns.length >=5){
      course = "MDNAシンデレラ";
      reason = "全身＋美容の最上位ケア";
    }

    if(course === ""){
      course = "リラックスセット";
      reason = "全身を整える定番コース";
    }

    // オプション
    if(concerns.includes("冷え・むくみ")){
      options.push("ホットリフレクソロジー");
    }

    if(concerns.includes("ストレス") || concerns.includes("不眠")){
      options.push("炭酸ヘッドセラピー");
    }

    if(concerns.includes("頭痛・眼精疲労")){
      options.push("スペシャルヘッドセラピー");
    }

    if(concerns.includes("美容")){
      options.push("SIXPAD");
    }

  }

  // オプション制限
  options = [...new Set(options)].slice(0,3);

  let html = `
    <div class="result">
    <h3>あなたにおすすめ</h3>

    <p><strong>コース：</strong><br>${course}</p>

    <p><strong>理由：</strong><br>${reason}</p>

    <p><strong>おすすめオプション：</strong><br>
    ${options.join("<br>")}
    </p>

    </div>
  `;

  document.getElementById("content").innerHTML = html;
}

// 起動
start();

</script>

</body>
</html>

</script>

</body>
</html>
