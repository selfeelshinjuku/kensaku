<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelFeel お悩み診断</title>

<style>
body {font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;padding:15px;background:#fdfaf5;color:#333;}
h2 {font-size:18px;margin:20px 0 10px;border-left:4px solid #c5a36b;padding-left:10px;}
.tag-box {display:flex;flex-wrap:wrap;gap:8px;}
label {border:1px solid #c5a36b;padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;}
input {display:none;}
input:checked + span {background:#1e4d58;color:#fff;border-radius:20px;padding:8px 14px;}

#message {margin:30px 0 25px;font-weight:bold;line-height:1.7;}

.top-card {background:#fff;border:2px solid #c5a36b;padding:20px;border-radius:12px;margin-bottom:20px;}
.top-title {font-size:14px;color:#c5a36b;}
.top-name {font-size:20px;font-weight:bold;}
.reason {margin-top:10px;font-size:13px;color:#555;line-height:1.6;}

.card {background:#fff;margin:10px 0;padding:15px;border-radius:10px;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.section-title {margin-top:25px;font-size:15px;color:#c5a36b;}

button {margin-top:10px;padding:10px;width:100%;border:none;background:#1e4d58;color:#fff;border-radius:6px;}
</style>
</head>

<body>

<h2>性別</h2>
<div class="tag-box">
<label><input type="radio" name="sex" value="male"><span>男性</span></label>
<label><input type="radio" name="sex" value="female"><span>女性</span></label>
</div>

<h2>年代</h2>
<div class="tag-box">
<label><input type="radio" name="age" value="10"><span>〜19</span></label>
<label><input type="radio" name="age" value="20"><span>20代</span></label>
<label><input type="radio" name="age" value="30"><span>30代</span></label>
<label><input type="radio" name="age" value="40"><span>40代</span></label>
<label><input type="radio" name="age" value="50"><span>50代</span></label>
<label><input type="radio" name="age" value="60"><span>60〜</span></label>
</div>

<h2>お悩み</h2>
<div id="concern-male" class="tag-box" style="display:none;">
<label><input type="checkbox" class="tag" value="コリ"><span>コリ・ハリ</span></label>
<label><input type="checkbox" class="tag" value="冷え"><span>冷え・むくみ</span></label>
<label><input type="checkbox" class="tag" value="ストレス"><span>ストレス</span></label>
<label><input type="checkbox" class="tag" value="不眠"><span>不眠</span></label>
<label><input type="checkbox" class="tag" value="だるさ"><span>だるさ</span></label>
<label><input type="checkbox" class="tag" value="眼精疲労"><span>眼精疲労</span></label>
<label><input type="checkbox" class="tag" value="活力"><span>活力・精力</span></label>
</div>

<div id="concern-female" class="tag-box" style="display:none;">
<label><input type="checkbox" class="tag" value="コリ"><span>コリ・ハリ</span></label>
<label><input type="checkbox" class="tag" value="冷え"><span>冷え・むくみ</span></label>
<label><input type="checkbox" class="tag" value="ストレス"><span>ストレス</span></label>
<label><input type="checkbox" class="tag" value="不眠"><span>不眠</span></label>
<label><input type="checkbox" class="tag" value="だるさ"><span>だるさ</span></label>
<label><input type="checkbox" class="tag" value="肌"><span>肌荒れ</span></label>
<label><input type="checkbox" class="tag" value="癒し"><span>精神的癒し</span></label>
</div>

<h2>施術部位</h2>
<div id="parts" class="tag-box"></div>

<h2>おすすめオプションも見る</h2>
<div class="tag-box">
<label><input type="radio" name="option" value="yes"><span>はい</span></label>
<label><input type="radio" name="option" value="no" checked><span>いいえ</span></label>
</div>

<div id="message"></div>
<div id="top"></div>
<div id="other"></div>

<script>

/* ===== 部位 ===== */
function renderParts(sex){
let base=["全身","ヘッド","フェイス","足裏","上半身","下半身"];
if(sex==="male") base.push("そけい");
document.getElementById("parts").innerHTML =
base.map(p=>`<label><input type="checkbox" class="tag" value="${p}"><span>${p}</span></label>`).join("");
}

/* ===== 悩み定義（ここが今回のキモ） ===== */
const concernList = ["コリ","冷え","ストレス","不眠","だるさ","肌","眼精疲労","活力","癒し"];

/* ===== コース ===== */
const courses = [
{sex:"male",name:"メンズアロマ",price:"12,000円〜",tags:["コリ","冷え","ストレス","不眠","全身"]},
{sex:"male",name:"メンズリカバリー",price:"17,000円〜",tags:["コリ","だるさ","全身"]},
{sex:"male",name:"アート＆メンズアロマ",price:"26,000円",tags:["ストレス","全身"]},
{sex:"male",name:"アート＆ヘッド",price:"23,500円",tags:["不眠","ヘッド"]},
{sex:"male",name:"メンズブースト",price:"ASK",tags:["活力","そけい"],maxAge:49},

{sex:"female",name:"リラックスセット",price:"9,500円〜",tags:["コリ","冷え","足裏","全身"]},
{sex:"female",name:"アート＆リフレ",price:"23,500円",tags:["ストレス","足裏","全身"]},
{sex:"female",name:"レイキヒーリング",price:"要確認",tags:["ストレス","全身"]},
{sex:"female",name:"アート＆ヘッド",price:"23,500円",tags:["不眠","ヘッド"]},
{sex:"female",name:"シンデレラリラックス",price:"22,000円",tags:["美容","全身"]},
{sex:"female",name:"シンデレラフェイシャル",price:"12,500円",tags:["肌","フェイス"]},
{sex:"female",name:"MDNAシンデレラ",price:"43,000円",tags:["美容","全身"]}
];

/* ===== オプション ===== */
const options = {
male:[
{name:"炭酸ヘッド",tags:["不眠","ヘッド"]},
{name:"スペシャルヘッド",tags:["不眠","ヘッド"]},
{name:"メンズエナジー",tags:["活力","そけい"]},
{name:"プチフェイシャル",tags:["肌","フェイス"]},
{name:"全身スクラブ",tags:["肌","全身"]}
],
female:[
{name:"炭酸ヘッド",tags:["不眠","ヘッド"]},
{name:"スペシャルヘッド",tags:["不眠","ヘッド"]},
{name:"ホットリフレ",tags:["冷え","足裏"]},
{name:"超音波レッグ",tags:["冷え","下半身"]},
{name:"レイキヒーリング",tags:["癒し","全身"]}
]
};

/* ===== イベント ===== */
document.querySelectorAll('input[name="sex"]').forEach(el=>{
el.addEventListener('change',()=>{
let sex=el.value;
document.getElementById("concern-male").style.display=sex==="male"?"flex":"none";
document.getElementById("concern-female").style.display=sex==="female"?"flex":"none";
renderParts(sex);
filter();
});
});

document.addEventListener('change',filter);

function filter(){

let sex=document.querySelector('input[name="sex"]:checked')?.value;
let age=parseInt(document.querySelector('input[name="age"]:checked')?.value||0);
let tags=[...document.querySelectorAll('.tag:checked')].map(e=>e.value);
let showOpt=document.querySelector('input[name="option"]:checked')?.value==="yes";

/* 🔥 悩みだけ抽出 */
let concernTags = tags.filter(t => concernList.includes(t));

/* 🔥 自然な文章 */
document.getElementById("message").innerHTML =
concernTags.length
? `${concernTags.join("や、")}などにお悩みなら…<br>あなたに合うケアをご提案します`
: "";

/* フィルタ */
let result=courses.filter(c=>{
if(sex && c.sex!==sex) return false;
if(c.maxAge && age>=50) return false;
return true;
});

/* スコア */
result=result.map(c=>{
let score=0;
tags.forEach(t=>{if(c.tags.includes(t))score+=2});
return {...c,score};
}).sort((a,b)=>b.score-a.score);

if(!result.length) return;

/* ===== 1位 ===== */
let top=result[0];

let reason="お悩みにバランス良く対応できるケアです。";

if(concernTags.includes("活力")){
reason="活力を高めたい状態なので、エネルギー循環を促す施術が効果的です。";
}else if(concernTags.includes("癒し")){
reason="精神的な緊張を緩め、深いリラックスへ導くケアが最適です。";
}else if(concernTags.includes("コリ") && concernTags.includes("ストレス")){
reason="コリとストレスが重なっているため、全身を緩めながら深く整えます。";
}

let optHTML="";
if(showOpt && sex){
let matched=options[sex].filter(o=>concernTags.some(t=>o.tags.includes(t)));
if(matched.length){
optHTML="<div class='section-title'>おすすめオプション</div>" +
matched.map(o=>`<div class="card">${o.name}</div>`).join("");
}
}

document.getElementById("top").innerHTML=`
<div class="top-card">
<div class="top-title">あなたに最もおすすめ</div>
<div class="top-name">${top.name}</div>
<div>${top.price}</div>
<div class="reason">${reason}</div>
<button>このコースを詳しく</button>
</div>
${optHTML}
`;

document.getElementById("other").innerHTML=
result.slice(1).map(c=>`
<div class="card">
<b>${c.name}</b><br>${c.price}
<button>このコースを詳しく</button>
</div>`).join("");

}

</script>

</body>
</html>
