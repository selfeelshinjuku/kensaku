<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelFeel お悩み診断</title>

<style>
body {font-family:-apple-system,sans-serif;margin:0;padding:15px;background:#fdfaf5;}
h2 {margin:20px 0 10px;border-left:4px solid #c5a36b;padding-left:10px;}
.tag-box {display:flex;flex-wrap:wrap;gap:8px;}
label {border:1px solid #c5a36b;padding:8px 14px;border-radius:20px;cursor:pointer;}
input {display:none;}
input:checked + span {background:#1e4d58;color:#fff;border-radius:20px;padding:8px 14px;}

.top-card {border:2px solid #c5a36b;padding:20px;border-radius:12px;margin:20px 0;background:#fff;}
.reason {margin-top:10px;font-size:13px;line-height:1.6;}

.card {background:#fff;margin:10px 0;padding:15px;border-radius:10px;}

button {margin-top:10px;padding:10px;width:100%;background:#1e4d58;color:#fff;border:none;border-radius:6px;}

#message {margin:25px 0;line-height:1.6;font-weight:bold;}
</style>
</head>

<body>

<h2>性別</h2>
<div class="tag-box">
<label><input type="radio" name="sex" value="male"><span>男性</span></label>
<label><input type="radio" name="sex" value="female"><span>女性</span></label>
</div>

<h2>年代</h2>
<div class="tag-box">
<label><input type="radio" name="age" value="20"><span>20代</span></label>
<label><input type="radio" name="age" value="30"><span>30代</span></label>
<label><input type="radio" name="age" value="40"><span>40代</span></label>
<label><input type="radio" name="age" value="50"><span>50代</span></label>
</div>

<h2>お悩み</h2>
<div class="tag-box">
<label><input type="checkbox" class="tag" value="コリ"><span>コリ</span></label>
<label><input type="checkbox" class="tag" value="ストレス"><span>ストレス</span></label>
<label><input type="checkbox" class="tag" value="不眠"><span>不眠</span></label>
<label><input type="checkbox" class="tag" value="冷え"><span>冷え</span></label>
<label><input type="checkbox" class="tag" value="だるさ"><span>だるさ</span></label>
</div>

<h2>おすすめオプションも見る</h2>
<div class="tag-box">
<label><input type="radio" name="option" value="yes"><span>はい</span></label>
<label><input type="radio" name="option" value="no" checked><span>いいえ</span></label>
</div>

<div id="message"></div>
<div id="top"></div>
<div id="list"></div>

<script>

const courses = [
{sex:"male",name:"メンズアロマ",tags:["コリ","ストレス","冷え"]},
{sex:"male",name:"メンズリカバリー",tags:["コリ","だるさ"]},
{sex:"female",name:"リラックスセット",tags:["冷え","だるさ"]},
{sex:"female",name:"アート＆リフレ",tags:["ストレス","不眠"]}
];

const options = [
{name:"炭酸ヘッド",tags:["不眠","ストレス"]},
{name:"ホットリフレ",tags:["冷え"]}
];

document.querySelectorAll('input').forEach(el=>{
el.addEventListener('change',filter);
});

function filter(){

let sex=document.querySelector('input[name="sex"]:checked')?.value;
let tags=[...document.querySelectorAll('.tag:checked')].map(e=>e.value);
let showOpt=document.querySelector('input[name="option"]:checked')?.value==="yes";

/* メッセージ */
document.getElementById("message").innerHTML =
tags.length ? `${tags.join("や")}にお悩みなら…最適なケアをご提案します` : "";

/* フィルタ */
let result=courses.filter(c=>!sex||c.sex===sex);

/* スコア */
result=result.map(c=>{
let score=0;
tags.forEach(t=>{if(c.tags.includes(t))score++});
return {...c,score};
}).sort((a,b)=>b.score-a.score);

if(result.length){

let top=result[0];

/* 🔥 人間っぽい理由 */
let reason="";
if(tags.includes("コリ") && tags.includes("ストレス")){
reason="コリとストレスが重なっているため、全身を緩めながら深いリラックスへ導きます。";
}else if(tags.includes("不眠")){
reason="自律神経にアプローチし、自然な眠りへ導くケアが適しています。";
}else{
reason="お悩みにバランス良く対応できるケアです。";
}

/* 🔥 オプション自動 */
let optHTML="";
if(showOpt){
let matched=options.filter(o=>tags.some(t=>o.tags.includes(t)));
optHTML=matched.map(o=>`<div class="card">${o.name}</div>`).join("");
}

document.getElementById("top").innerHTML=`
<div class="top-card">
<b>あなたに最もおすすめ</b><br>
${top.name}
<div class="reason">${reason}</div>
<button>このコースを詳しく</button>
</div>
${optHTML}
`;

}

/* 他 */
document.getElementById("list").innerHTML=
result.slice(1).map(c=>`<div class="card">${c.name}</div>`).join("");

}

</script>

</body>
</html>
