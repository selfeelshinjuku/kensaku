<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelFeel お悩み診断</title>

<style>
body {font-family:-apple-system,sans-serif;margin:0;padding:15px;background:#fdfaf5;}
h2 {margin:20px 0 10px;border-left:4px solid #c5a36b;padding-left:10px;}
.tag-box {display:flex;flex-wrap:wrap;gap:8px;}
label {border:1px solid #c5a36b;padding:8px 14px;border-radius:20px;cursor:pointer;font-size:13px;}
input {display:none;}
input:checked + span {background:#1e4d58;color:#fff;border-radius:20px;padding:8px 14px;}

#message {margin:30px 0;font-weight:bold;line-height:1.7;}

.top-card {border:2px solid #c5a36b;padding:20px;border-radius:12px;background:#fff;margin-bottom:20px;}
.reason {margin-top:10px;font-size:13px;color:#555;}

.card {background:#fff;padding:15px;border-radius:10px;margin:10px 0;box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.section-title {margin-top:20px;color:#c5a36b;}

.sub-list {margin-top:10px;}
.sub-item {padding:10px 5px;border-bottom:1px solid #eee;font-size:13px;color:#444;}

button {margin-top:10px;width:100%;padding:10px;background:#1e4d58;color:#fff;border:none;border-radius:6px;}
.reset-btn {background:#aaa;margin-top:20px;}
</style>
</head>

<body>

<h2>性別</h2>
<div class="tag-box">
<label><input type="radio" name="sex" value="male"><span>男性</span></label>
<label><input type="radio" name="sex" value="female"><span>女性</span></label>
</div>

<h2>年代</h2>
<div class="tag-box">
<label><input type="radio" name="age" value="10"><span>〜19</span></label>
<label><input type="radio" name="age" value="20"><span>20代</span></label>
<label><input type="radio" name="age" value="30"><span>30代</span></label>
<label><input type="radio" name="age" value="40"><span>40代</span></label>
<label><input type="radio" name="age" value="50"><span>50代</span></label>
<label><input type="radio" name="age" value="60"><span>60〜</span></label>
</div>

<h2>お悩み</h2>
<div id="concern-male" class="tag-box" style="display:none;"></div>
<div id="concern-female" class="tag-box" style="display:none;"></div>

<h2>施術部位</h2>
<div id="parts" class="tag-box"></div>

<h2>おすすめオプションも見る</h2>
<div class="tag-box">
<label><input type="radio" name="option" value="yes"><span>はい</span></label>
<label><input type="radio" name="option" value="no" checked><span>いいえ</span></label>
</div>

<div id="message"></div>
<div id="top"></div>
<div id="other"></div>

<button class="reset-btn" onclick="resetAll()">入力内容をリセットする</button>

<script>

/* ===== 悩み ===== */
const concernMale = ["コリ","冷え","ストレス","不眠","だるさ","眼精疲労","活力","肌荒"];
const concernFemale = ["コリ","冷え","ストレス","不眠","だるさ","肌荒","癒し"];

/* ===== コース完全網羅 ===== */
const courses = [

// 男性
{sex:"male",name:"メンズアロマ",price:"12,000円〜",tags:["コリ","冷え","ストレス","不眠","だるさ","肌荒","全身"]},
{sex:"male",name:"メンズリカバリー",price:"17,000円〜",tags:["コリ","冷え","ストレス","不眠","だるさ","眼精疲労","肌荒","活力","全身","ヘッド","そけい"]},
{sex:"male",name:"メンズブースト",price:"12,000円〜",tags:["冷え","ストレス","不眠","眼精疲労","活力","下半身","そけい"],maxAge:49},
{sex:"male",name:"スリム集中ケア",price:"12,500円",tags:["上半身","痩身"]},
{sex:"male",name:"SIX PAD 30",price:"8,500円",tags:["上半身","痩身"]},
{sex:"male",name:"足裏角質ケア",price:"8,000円",tags:["肌荒","足裏"]},
{sex:"male",name:"リラックスセット",price:"9,500円〜",tags:["コリ","冷え","だるさ","全身","足裏"]},
{sex:"male",name:"リラックス整体",price:"7,000円〜",tags:["コリ","だるさ","全身"]},
{sex:"male",name:"リフレクソロジー",price:"8,000円",tags:["冷え","肌荒","足裏"]},
{sex:"male",name:"メンズマックス",price:"28,000円〜",tags:["コリ","冷え","ストレス","不眠","だるさ","眼精疲労","肌荒","活力","全身","ヘッド","フェイス","そけい"]},

// 女性
{sex:"female",name:"リラックスセット",price:"9,500円〜",tags:["コリ","冷え","だるさ","全身","足裏"]},
{sex:"female",name:"リラックス整体",price:"7,000円〜",tags:["コリ","だるさ","全身"]},
{sex:"female",name:"リフレクソロジー",price:"8,000円",tags:["冷え","肌荒","足裏"]},
{sex:"female",name:"シンデレラリラックス",price:"22,000円",tags:["コリ","冷え","ストレス","だるさ","眼精疲労","肌荒","全身","フェイス","足裏"]},
{sex:"female",name:"MDNAシンデレラ",price:"43,000円",tags:["コリ","冷え","ストレス","だるさ","眼精疲労","肌荒","全身","フェイス","足裏"]},
{sex:"female",name:"シンデレラフェイシャル",price:"12,500円",tags:["ストレス","眼精疲労","肌荒","フェイス"]}
];

/* ===== オプション完全網羅 ===== */
const options = {

male:[
{name:"SIXPAD 15",tags:["コリ","冷え","だるさ","活力","上半身"]},
{name:"SIXPAD 30",tags:["コリ","冷え","だるさ","活力","上半身"]},
{name:"炭酸ヘッドセラピー",tags:["ストレス","不眠","眼精疲労","ヘッド"]},
{name:"スペシャルヘッドセラピー",tags:["ストレス","不眠","眼精疲労","ヘッド"]},
{name:"プチフェイシャル",tags:["肌荒","フェイス"]},
{name:"メンズエナジー",tags:["活力","ストレス","そけい"]},
{name:"背中スクラブ",tags:["肌荒","上半身"]},
{name:"全身スクラブ",tags:["肌荒","全身"]},
{name:"背中パック",tags:["肌荒","上半身"]}
],

female:[
{name:"SIXPAD 15",tags:["コリ","冷え","だるさ","上半身"]},
{name:"SIXPAD 30",tags:["コリ","冷え","だるさ","上半身"]},
{name:"炭酸ヘッドセラピー",tags:["ストレス","不眠","眼精疲労","ヘッド"]},
{name:"スペシャルヘッドセラピー",tags:["ストレス","不眠","眼精疲労","ヘッド"]},
{name:"ホットリフレクソロジー",tags:["冷え","だるさ","足裏"]},
{name:"超音波レッグケア",tags:["冷え","だるさ","下半身"]},
{name:"レイキヒーリング",tags:["ストレス","不眠","癒し"]}
]

};

/* ===== UI ===== */

function renderConcerns(sex){
let list = sex==="male" ? concernMale : concernFemale;
let target = document.getElementById(sex==="male"?"concern-male":"concern-female");

target.innerHTML = list.map(v=>`
<label><input type="checkbox" class="tag" value="${v}"><span>${v}</span></label>
`).join("");

target.style.display="flex";
}

function renderParts(sex){
let base=["全身","ヘッド","フェイス","足裏","上半身","下半身"];
if(sex==="male") base.push("そけい");

document.getElementById("parts").innerHTML =
base.map(v=>`<label><input type="checkbox" class="tag" value="${v}"><span>${v}</span></label>`).join("");
}

/* ===== イベント ===== */

document.querySelectorAll('input[name="sex"]').forEach(el=>{
el.addEventListener('change',()=>{
document.getElementById("concern-male").style.display="none";
document.getElementById("concern-female").style.display="none";
renderConcerns(el.value);
renderParts(el.value);
filter();
});
});

document.addEventListener('change',filter);

/* ===== ロジック ===== */

function filter(){

let sex=document.querySelector('input[name="sex"]:checked')?.value;
let age=parseInt(document.querySelector('input[name="age"]:checked')?.value||0);
let tags=[...new Set([...document.querySelectorAll('.tag:checked')].map(e=>e.value))];

let concernList = sex==="male"?concernMale:concernFemale;
let concernTags = tags.filter(t=>concernList.includes(t));

let msg="";
if(concernTags.length){
msg = concernTags.length===1
? `${concernTags[0]}にお悩みなら…`
: `${concernTags[0]}や${concernTags.slice(1).join("、")}などにお悩みなら…`;
msg += "<br>今のあなたに合う コンディショニング・ケア をご提案します";
}
document.getElementById("message").innerHTML=msg;

/* コース */
let result=courses.filter(c=>{
if(sex && c.sex!==sex) return false;
if(c.maxAge && age>=50) return false;
return true;
});

result=result.map(c=>{
let score=0;
tags.forEach(t=>{if(c.tags.includes(t))score+=3});
concernTags.forEach(t=>{if(c.tags.includes(t))score+=2});
return {...c,score};
}).sort((a,b)=>b.score-a.score);

if(!result.length) return;

let top=result[0];

/* オプション */
let optHTML="";
if(document.querySelector('input[name="option"]:checked')?.value==="yes" && sex){

let matched = options[sex].map(o=>{
let score=0;
tags.forEach(t=>{if(o.tags.includes(t))score+=2});
return {...o,score};
}).sort((a,b)=>b.score-a.score);

matched = matched.filter(o=>o.score>0);
if(matched.length===0) matched = options[sex];
matched = matched.slice(0,3);

optHTML = `
<div class="section-title">● オプションを追加して、カスタムしませんか…</div>
` + matched.map(o=>`<div class="card">${o.name}</div>`).join("");
}

let subCourses = result.slice(1,3);

document.getElementById("top").innerHTML=`
<div class="top-card">
<b>今のあなたに最もおすすめのコース</b><br>${top.name}<br>${top.price}
<div class="reason">施術前に体調やご希望をお伺いします。</div>
<button>このコースを詳しく</button>
</div>
${optHTML}
`;

document.getElementById("other").innerHTML = subCourses.length ? `
<div class="section-title">● 他のおすすめコースと、組み合わせにいかがでしょうか…</div>
<div class="sub-list">
${subCourses.map(c=>`<div class="sub-item">${c.name}　${c.price}</div>`).join("")}
</div>` : "";

}

/* ===== リセット ===== */

function resetAll(){
document.querySelectorAll('input').forEach(el=>el.checked=false);
document.getElementById("concern-male").innerHTML="";
document.getElementById("concern-female").innerHTML="";
document.getElementById("parts").innerHTML="";
document.getElementById("message").innerHTML="";
document.getElementById("top").innerHTML="";
document.getElementById("other").innerHTML="";
document.getElementById("concern-male").style.display="none";
document.getElementById("concern-female").style.display="none";
}

</script>

</body>
</html>
