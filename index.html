<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SelFeel お悩み診断</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin: 0;
    padding: 15px;
    background: #fdfaf5;
    color: #333;
}

h2 {
    font-size: 18px;
    margin: 20px 0 10px;
    border-left: 4px solid #c5a36b;
    padding-left: 10px;
}

.tag-box {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

label {
    border: 1px solid #c5a36b;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
}

input { display:none; }

input:checked + span {
    background: #1e4d58;
    color: #fff;
    border-radius: 20px;
    padding: 8px 14px;
}

.card {
    background:#fff;
    margin:15px 0;
    padding:15px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.recommend {
    color:#c5a36b;
    font-size:12px;
    margin-bottom:5px;
}

button {
    margin-top:10px;
    padding:10px;
    width:100%;
    border:none;
    background:#1e4d58;
    color:#fff;
    border-radius:6px;
}

</style>
</head>

<body>

<h2>性別</h2>
<div class="tag-box">
<label><input type="radio" name="sex" value="male"><span>男性</span></label>
<label><input type="radio" name="sex" value="female"><span>女性</span></label>
</div>

<h2>お悩み</h2>
<div class="tag-box">
<label><input type="checkbox" class="tag" value="コリ"><span>コリ・ハリ</span></label>
<label><input type="checkbox" class="tag" value="冷え"><span>冷え・むくみ</span></label>
<label><input type="checkbox" class="tag" value="ストレス"><span>ストレス</span></label>
<label><input type="checkbox" class="tag" value="不眠"><span>不眠</span></label>
<label><input type="checkbox" class="tag" value="だるさ"><span>だるさ</span></label>
<label><input type="checkbox" class="tag" value="肌"><span>肌荒れ</span></label>
<label><input type="checkbox" class="tag" value="眼精疲労"><span>眼精疲労</span></label>
</div>

<h2>なりたい状態</h2>

<div id="male" class="tag-box" style="display:none;">
<label><input type="checkbox" class="tag" value="パフォーマンス"><span>仕事の質UP</span></label>
<label><input type="checkbox" class="tag" value="疲労回復"><span>疲れを抜きたい</span></label>
<label><input type="checkbox" class="tag" value="思考クリア"><span>頭をクリアに</span></label>
<label><input type="checkbox" class="tag" value="活力"><span>活力UP</span></label>
</div>

<div id="female" class="tag-box" style="display:none;">
<label><input type="checkbox" class="tag" value="癒し"><span>癒されたい</span></label>
<label><input type="checkbox" class="tag" value="デトックス"><span>体を軽く</span></label>
<label><input type="checkbox" class="tag" value="美容"><span>綺麗になりたい</span></label>
<label><input type="checkbox" class="tag" value="休息"><span>贅沢に休む</span></label>
</div>

<div id="result"></div>

<script>

const data = [

{sex:"male",name:"メンズアロマ",price:"12,000円〜",tags:["コリ","冷え","ストレス","不眠","だるさ","肌","疲労回復"]},
{sex:"male",name:"メンズリカバリー",price:"17,000円〜",tags:["コリ","ストレス","不眠","眼精疲労","疲労回復","思考クリア"]},
{sex:"male",name:"メンズブースト",price:"12,000円〜",tags:["活力","ストレス","不眠"]},
{sex:"male",name:"メンズマックス",price:"28,000円〜",tags:["コリ","ストレス","不眠","活力"]},

{sex:"female",name:"リラックスセット",price:"9,500円〜",tags:["コリ","冷え","だるさ","デトックス"]},
{sex:"female",name:"シンデレラリラックス",price:"22,000円",tags:["コリ","冷え","ストレス","美容"]},
{sex:"female",name:"MDNAシンデレラ",price:"43,000円",tags:["美容","デトックス"]},

{sex:"female",name:"シンデレラフェイシャル",price:"12,500円",tags:["肌","美容"]},

];

document.querySelectorAll('input[name="sex"]').forEach(el=>{
el.addEventListener('change',()=>{
let sex=document.querySelector('input[name="sex"]:checked').value;
document.getElementById("male").style.display=sex==="male"?"flex":"none";
document.getElementById("female").style.display=sex==="female"?"flex":"none";
filter();
});
});

document.querySelectorAll('.tag').forEach(el=>{
el.addEventListener('change',filter);
});

function filter(){

let sex=document.querySelector('input[name="sex"]:checked')?.value;
let tags=[...document.querySelectorAll('.tag:checked')].map(e=>e.value);

let result=data.filter(m=>!sex||m.sex===sex);

result=result.map(m=>{
let score=0;
tags.forEach(t=>{if(m.tags.includes(t))score+=2});
return {...m,score};
}).sort((a,b)=>b.score-a.score);

document.getElementById("result").innerHTML=result.map(m=>`
<div class="card">
<div class="recommend">${m.score>=4?"おすすめ":" "}</div>
<b>${m.name}</b><br>
${m.price}
<button>このコースを予約</button>
</div>
`).join("");

}

</script>

</body>
</html>
