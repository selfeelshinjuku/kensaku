<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelFeel新宿 | お悩み別メニュー検索</title>
    <style>
        /* 【style.cssの内容】 */
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; margin: 0; padding: 10px; color: #333; }
        #search-section { background: #fdfaf5; padding: 25px; border-radius: 12px; margin-bottom: 30px; }
        h3 { color: #1e4d58; font-size: 1.2rem; margin-top: 0; border-bottom: 2px solid #c5a36b; display: inline-block; padding-bottom: 5px; }
        #tag-filters { display: flex; flex-wrap: wrap; gap: 8px; margin: 20px 0; }
        #tag-filters label { cursor: pointer; padding: 8px 15px; border: 1px solid #c5a36b; border-radius: 20px; background: #fff; font-size: 13px; transition: all 0.3s; }
        #tag-filters input { display: none; }
        #tag-filters label:has(input:checked) { background: #1e4d58; color: #fff; border-color: #1e4d58; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 15px; }
        .menu-card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .badge { background: #c5a36b; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-bottom: 8px; }
        .menu-name { font-weight: bold; margin: 5px 0; font-size: 1.1rem; }
        .price { color: #1e4d58; font-weight: bold; margin-bottom: 10px; }
        .tags { font-size: 11px; color: #999; }
        #results-count { margin-bottom: 15px; font-size: 14px; color: #666; }
    </style>
</head>
<body>

<div id="search-section">
    <h3>お悩みから選ぶ（複数選択可）</h3>
    <div id="tag-filters">
        <label><input type="checkbox" class="tag-chk" value="コリ/ハリ"> コリ/ハリ</label>
        <label><input type="checkbox" class="tag-chk" value="不眠"> 不眠</label>
        <label><input type="checkbox" class="tag-chk" value="ストレス"> ストレス</label>
        <label><input type="checkbox" class="tag-chk" value="冷/むくみ"> 冷/むくみ</label>
        <label><input type="checkbox" class="tag-chk" value="眼精疲労"> 眼精疲労</label>
        <label><input type="checkbox" class="tag-chk" value="全身"> 全身</label>
        <label><input type="checkbox" class="tag-chk" value="ヘッド"> ヘッド</label>
    </div>

    <div id="results-count">該当メニュー：<span id="count">0</span>件</div>
    <div id="menu-list" class="results-grid"></div>
</div>

<script>
    // 【script.jsの内容：メニューデータ】
    // ここを編集してメニューを増やしてください
    const menuData = [
        // --- 男性用コース ---
        { sex: "male", name: "メンズアロマ 1.5時間", price: "12,000円", tags: ["コリ/ハリ", "冷/むくみ", "不眠", "ストレス", "全身", "オイル"], feat: "人気No1" },
        { sex: "male", name: "メンズアロマ 2時間", price: "15,000円", tags: ["コリ/ハリ", "冷/むくみ", "不眠", "ストレス", "全身", "オイル"], feat: "おすすめ" },
        { sex: "male", name: "メンズアロマ 2.5時間", price: "18,000円", tags: ["コリ/ハリ", "冷/むくみ", "不眠", "ストレス", "全身", "オイル"], feat: "満足度高" },
        { sex: "male", name: "メンズアロマ 3時間", price: "21,000円", tags: ["コリ/ハリ", "冷/むくみ", "不眠", "ストレス", "全身", "オイル"], feat: "至福" },
        { sex: "male", name: "メンズリカバリー 1.5時間", price: "12,000円", tags: ["コリ/ハリ", "腰痛", "疲労回復", "全身", "整体"], feat: "NEW" },
        { sex: "male", name: "メンズリカバリー 2時間", price: "15,000円", tags: ["コリ/ハリ", "腰痛", "疲労回復", "全身", "整体"], feat: "ガッツリ" },

        // --- 男性用オプション ---
        { sex: "male", name: "炭酸ヘッドセラピー", price: "+1,500円", tags: ["不眠", "眼精疲労", "ヘッド", "ストレス"], feat: "リびNo1" },
        { sex: "male", name: "メンズエナジー", price: "+1,500円", tags: ["活力", "そけい", "ストレス", "オイル"], feat: "人気No1" },
        { sex: "male", name: "首肩集中", price: "+1,500円", tags: ["コリ/ハリ", "頭痛/眼疲"], feat: "おすすめ" },
        { sex: "male", name: "ハンド", price: "+1,500円", tags: ["コリ/ハリ", "ストレス"], feat: "癒やし" },
        { sex: "male", name: "フェイシャル", price: "+3,000円", tags: ["肌荒", "フェイス"], feat: "美肌" },

        // --- 女性用コース ---
        { sex: "female", name: "アロマ整体 60分", price: "7,000円", tags: ["コリ/ハリ", "冷/むくみ", "全身", "整体", "オイル"], feat: "お試し" },
        { sex: "female", name: "アロマ整体 90分", price: "10,000円", tags: ["コリ/ハリ", "冷/むくみ", "全身", "整体", "オイル"], feat: "人気No1" },
        { sex: "female", name: "アロマ整体 120分", price: "13,000円", tags: ["コリ/ハリ", "冷/むくみ", "全身", "整体", "オイル"], feat: "おすすめ" },
        { sex: "female", name: "アロマ整体 150分", price: "16,000円", tags: ["コリ/ハリ", "冷/むくみ", "全身", "整体", "オイル"], feat: "ご褒美" },
        { sex: "female", name: "小顔矯正・美肌 60分", price: "8,000円", tags: ["肌荒", "フェイス", "眼精疲労"], feat: "女性支持" },

        // --- 女性用オプション ---
        { sex: "female", name: "腸セラピー", price: "+2,000円", tags: ["冷/むくみ", "デトックス", "お腹"], feat: "おすすめ" },
        { sex: "female", name: "炭酸ヘッド", price: "+1,500円", tags: ["不眠", "眼精疲労", "ヘッド"], feat: "スッキリ" },
        { sex: "female", name: "角質ケア（足裏）", price: "+2,000円", tags: ["冷/むくみ", "美肌"], feat: "ツルツル" }
    ];

    // 男女別表示設定（'all', 'male', 'female'）
    // Jimdoの埋め込みURLの末尾に ?sex=male などと付けても判別できるようにできます
    const urlParams = new URLSearchParams(window.location.search);
    const currentPageSex = urlParams.get('sex') || 'all'; 

    const filterAndDisplay = () => {
        const activeTags = Array.from(document.querySelectorAll('.tag-chk:checked')).map(cb => cb.value);
        
        let filtered = menuData.filter(m => currentPageSex === 'all' || m.sex === currentPageSex);
        if (activeTags.length > 0) {
            filtered = filtered.filter(m => activeTags.some(t => m.tags.includes(t)));
        }

        const container = document.getElementById('menu-list');
        container.innerHTML = filtered.map(m => `
            <div class="menu-card">
                <span class="badge">${m.feat}</span>
                <div class="menu-name">${m.name}</div>
                <div class="price">${m.price}</div>
                <div class="tags">${m.tags.map(t => `#${t}`).join(' ')}</div>
            </div>
        `).join('');
        
        document.getElementById('count').innerText = filtered.length;
    };

    document.querySelectorAll('.tag-chk').forEach(el => el.addEventListener('change', filterAndDisplay));
    window.onload = filterAndDisplay;
</script>

</body>
</html>
